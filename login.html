<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PUNTO.PUNTO.-RAYA</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 20%; background-color: #1a1a1a; color: white; }
        .btn { display: inline-block; padding: 20px 40px; font-size: 22px; font-weight: bold; color: white; background-color: #d4af37; text-decoration: none; border-radius: 50px; border: 3px solid white; cursor: pointer; }
    </style>
</head>
<body>
    <h2>¡AUTENTICACIÓN EXITOSA!</h2>
    <p>Presiona el botón para volver al combate</p>
    
    <button id="btn-regresar" class="btn">ENTRAR AL JUEGO</button>

    <script>
        document.getElementById("btn-regresar").addEventListener("click", function() {
            var params = window.location.search;
            
            // Usamos la URL cruda directamente. Sin "intent", sin "package".
            var urlDirecta = "puntoraya://login" + params;
            
            window.location.href = urlDirecta;
        });
    </script>
</body>
</html>
