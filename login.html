<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PUNTO.PUNTO.-RAYA</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 15%; background-color: #1a1a1a; color: white; }
        .btn { display: block; padding: 20px; margin: 20px auto; width: 80%; font-size: 20px; font-weight: bold; color: white; background-color: #d4af37; text-decoration: none; border-radius: 50px; border: 3px solid white; }
    </style>
</head>
<body>
    <h2>¡AUTENTICACIÓN EXITOSA!</h2>
    <p>Toca el botón para regresar</p>
    
    <a id="btn-intent" class="btn" href="#">ENTRAR AL JUEGO</a>

    <script>
        var params = window.location.search; // Esto trae el "?code=..." de Google
        var paquete = "com.jgsgames.puntoraya";
        
        // Enlace perfecto para que Android no lo mande a la tienda
        var urlIntent = "intent://login/" + params + "#Intent;scheme=puntoraya;package=" + paquete + ";end";
        
        document.getElementById("btn-intent").href = urlIntent;
    </script>
</body>
</html>
