<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PUNTO.PUNTO.-RAYA | Login</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 20%; background-color: #1a1a1a; color: white; }
        .btn { display: inline-block; padding: 20px 40px; font-size: 22px; font-weight: bold; color: white; background-color: #d4af37; text-decoration: none; border-radius: 50px; border: 3px solid white; cursor: pointer; }
        p { color: #aaaaaa; }
    </style>
</head>
<body>
    <h2>¡AUTENTICACIÓN EXITOSA!</h2>
    <p>Presiona el botón para volver al juego</p>
    
    <button id="btn-regresar" class="btn">VOLVER AL JUEGO</button>

    <script>
        document.getElementById("btn-regresar").addEventListener("click", function() {
            var params = window.location.search;
            var paquete = "com.jgsgames.puntoraya";
            
            // Asegúrate de que la URL se construya con una / después de 'login'
			var intentUrl = "intent://login/#Intent;scheme=puntoraya;package=com.jgsgames.puntoraya;end";            
			
            window.location.href = intentUrl;
        });

        // Intento automático a los 1.5 segundos
        setTimeout(function() {
            document.getElementById("btn-regresar").click();
        }, 1500);
    </script>
</body>
</html>
